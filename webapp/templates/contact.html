{% extends 'base.html' %}

{% block title %}Contact us {% endblock title %}

{% block body %}

<form method="post" action="{% url 'contact' %}">

  {% csrf_token %}

  <div class="col-md-6 bg-dark mx-auto">

    <h3 class="text-center text-white p-2" style="letter-spacing:5px">CONTACT US</h3>
 
  </div>


 <div class="col-md-6  mx-auto">

  <div class="mb-3">
  <label for="name" class="form-label">Name</label>
  <input type="text" class="form-control" id="name" placeholder="Enter your name" name="fname">
</div>

 <div class="mb-3">
  <label for="contact" class="form-label">Contact no</label>
  <input type="number" class="form-control" id="contact" placeholder="Enter your contact" name="contact">
</div>

  <div class="mb-3">
  <label for="email" class="form-label">Email address</label>
  <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email">
</div>

<div class="mb-3">
  <label for="pass" class="form-label">Password</label>
  <input type="password" class="form-control" id="pass" placeholder="Enter your password" name="password">
</div>
<div class="mb-3">
  <label for="message" class="form-label">Messsage</label>
  <textarea class="form-control" id="message" rows="3" name="message"></textarea>
</div>

<div class="d-flex justify-content-center"><button type="submit" class="btn btn-dark">Submit</button></div>

  </div>

</form>

{% endblock body %}
